name: Historical Backfill

# Manual only - this is a heavy, one-off pull, not something to run on a
# schedule. Trigger it from the Actions tab whenever you want to (re)fetch a
# large stretch of history.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days of history to pull (e.g. 1825 = ~5 years)"
        required: true
        default: "1825"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Garmin session token
        run: |
          mkdir -p tokens
          printf '%s' "$GARMIN_TOKEN_JSON" > tokens/garmin_tokens.json
        env:
          GARMIN_TOKEN_JSON: ${{ secrets.GARMIN_TOKEN_JSON }}

      - name: Backfill Garmin data
        run: python sync_garmin.py --days "${{ github.event.inputs.days }}"

      - name: Commit updated data
        run: |
          git config user.name "garmin-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add garmin/
          git diff --cached --quiet || git commit -m "Historical backfill (${{ github.event.inputs.days }} days)"
          git push
