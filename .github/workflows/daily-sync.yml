name: Daily Garmin Sync

on:
  schedule:
    # 15:00 UTC = 8:00am Phoenix time (Arizona stays on MST/UTC-7 year-round,
    # no daylight saving, so this offset never needs to change).
    - cron: "0 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Garmin session token
        run: |
          mkdir -p tokens
          printf '%s' "$GARMIN_TOKEN_JSON" > tokens/garmin_tokens.json
        env:
          GARMIN_TOKEN_JSON: ${{ secrets.GARMIN_TOKEN_JSON }}

      - name: Sync Garmin data
        run: python sync_garmin.py --days 2

      - name: Commit updated data
        run: |
          git config user.name "garmin-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add garmin/
          git diff --cached --quiet || git commit -m "Daily Garmin data sync"
          git push
